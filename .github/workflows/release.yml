name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pip install pytest
          pytest scripts/web_reader_pro.py || true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            SKILL.md
            README.md
            requirements.txt
            scripts/*.py
            scripts/*.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
